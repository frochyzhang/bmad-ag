code: agcore
name: "BMAD ag-core Skills"
description: "仅 Go/ag-core 项目需要选择。集成 ag-core 微服务框架：加载 ag-skills 知识底座、走 proto→aggo 骨架→biz 填肉流水线、build+ag-core-lint 护栏，并把开发过程沉淀进唯一第二记忆体（Obsidian vault）。"
default_selected: false # 按需安装，避免非 Go 项目安装 aggo、ag-skills 和 ag 相关技能

header: "BMAD ag-core Configuration"
subheader: "配置 ag-core 集成模块。\n工具链从 GitHub 唯一来源安装,知识底座 clone ag-skills,开发记忆沉淀进 Obsidian vault。"

# Variables from Core Config inserted:
## user_name
## project_name
## communication_language
## document_output_language
## output_folder

# vault 根路径:CAP-5 的 vault-write 脚本与 dev skill 从此 key 读(AD-9 / AD-11)。
# 故意不设 default:让它落入"必答问题"通道,首次安装强制提示指定你自己的 Obsidian vault 实际路径。
# --yes 非交互场景请显式传 --set agcore.vault_path=<你的路径>,否则留空由脚本层容错。
vault_path:
  prompt: "What is the root path of your Obsidian vault? (Required, e.g. ~/vaults/my-vault)"
  result: "{value}"

# ag-skills checkout 位置:CAP-1 的 SKILL_ROOT 解析与 CAP-7 的 re-sync 比对从此 key 读(AD-6 / AD-11)。
agskills_path:
  prompt: "ag-skills 知识底座 clone 到哪个位置?"
  default: ".bmad-agcore/ag-skills"
  result: "{project-root}/{value}"

# CAP-7 知识过期阈值:re-sync 比对落后超此天数则提醒(AD-12)。
staleness_threshold_days:
  prompt: "ag-skills 快照落后上游多少天后提醒 re-sync?"
  default: 30
  result: "{value}"

# 安装时创建的目录(声明式,无代码执行)。agskills_path 的实际 clone 由安装后钩子完成。
directories:
  - "{output_folder}"
